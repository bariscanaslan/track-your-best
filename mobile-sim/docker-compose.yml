services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      FRONTEND_ORIGIN: http://sim.trackyourbest.net:4242
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Relative path — browser calls /api/* on the same domain, nginx proxies it
        VITE_API_URL: /api
    ports:
      - "4242:80"
    depends_on:
      - backend
    restart: unless-stopped
