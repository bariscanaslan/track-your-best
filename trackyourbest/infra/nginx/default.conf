# ─────────────────────────────────────────────────────────────────
# HTTP — redirect to HTTPS + serve ACME challenge for Certbot
# ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.trackyourbest.net api.trackyourbest.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────
# Frontend — app.trackyourbest.net
# ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.trackyourbest.net;

    ssl_certificate     /etc/letsencrypt/live/app.trackyourbest.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.trackyourbest.net/privkey.pem;
    include             /etc/nginx/conf.d/ssl-params.conf;

    # Next.js static assets — long-lived cache
    location /_next/static/ {
        proxy_pass         http://frontend:3003;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass          http://frontend:3003;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
    }
}

# ─────────────────────────────────────────────────────────────────
# API — api.trackyourbest.net
# ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.trackyourbest.net;

    ssl_certificate     /etc/letsencrypt/live/api.trackyourbest.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.trackyourbest.net/privkey.pem;
    include             /etc/nginx/conf.d/ssl-params.conf;

    # Allow larger payloads for file/image uploads
    client_max_body_size 20M;

    location / {
        proxy_pass          http://api:8080;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        # Longer timeout for potentially slow ML-backed endpoints
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }
}
