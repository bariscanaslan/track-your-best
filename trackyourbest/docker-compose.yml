services:

  # ─────────────────────────────────────────────
  # Nginx reverse proxy  (only public-facing service)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tyb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend

  # ─────────────────────────────────────────────
  # Certbot — auto-renews every 12 h
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: tyb-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot;
      sleep 12h & wait $${!}; done"

  # ─────────────────────────────────────────────
  # ASP.NET Core REST API  (internal)
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./TYB.ApiService
      dockerfile: Dockerfile
    container_name: tyb-api
    restart: unless-stopped
    # Allows reaching the external PostgreSQL Docker container via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Database
      TYB_API_CONNECTION_STRING: "Host=${POSTGRES_HOST};Port=${POSTGRES_PORT:-5432};Database=trackyourbest;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Ssl Mode=Disable"
      # Auth
      TYB_JWT_SECRET: ${TYB_JWT_SECRET}
      TYB_JWT_EXPIRY_HOURS: ${TYB_JWT_EXPIRY_HOURS:-8}
      # Routing
      TYB_OSRM_BASE_URL: ${TYB_OSRM_BASE_URL}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
      # Geocoding
      TYB_NOMINATIM_BASE_URL: ${TYB_NOMINATIM_BASE_URL}
      TYB_NOMINATIM_USER_AGENT: ${TYB_NOMINATIM_USER_AGENT}
      # CORS — allow the frontend domain
      TYB_CORS_ORIGINS: https://app.trackyourbest.net
    volumes:
      - api_uploads:/app/wwwroot/uploads

  # ─────────────────────────────────────────────
  # .NET IoT Worker  (internal)
  # ─────────────────────────────────────────────
  iot:
    build:
      context: ./TYB.IoTService
      dockerfile: Dockerfile
    container_name: tyb-iot
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database
      TYB_IOT_CONNECTION_STRING: "Host=${POSTGRES_HOST};Port=${POSTGRES_PORT:-5432};Database=trackyourbest;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Ssl Mode=Disable"
      # MQTT — overrides appsettings.json Mqtt section via .NET config convention
      Mqtt__Host: ${MQTT_HOST}
      Mqtt__Port: ${MQTT_PORT:-1883}
      Mqtt__Username: ${MQTT_USERNAME}
      Mqtt__Password: ${MQTT_PASSWORD}

  # ─────────────────────────────────────────────
  # Python ML Scheduler  (internal)
  # ─────────────────────────────────────────────
  ml:
    build:
      context: ./TYB.MLService
      dockerfile: Dockerfile
    container_name: tyb-ml
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/trackyourbest"
      OSRM_URL: ${TYB_OSRM_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  # ─────────────────────────────────────────────
  # Next.js Frontend  (internal — served via nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time — must be the public-facing URL
        NEXT_PUBLIC_API_BASE_URL: https://api.trackyourbest.net
    container_name: tyb-frontend
    restart: unless-stopped
    depends_on:
      - api

volumes:
  certbot_certs:
  certbot_webroot:
  api_uploads:
