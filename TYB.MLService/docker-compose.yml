# ============================================
# TYB MLService - Docker Compose
# ============================================
version: '3.8'

services:
  tyb-mlservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tyb-mlservice
    restart: unless-stopped
    
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OSRM_URL=${OSRM_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    volumes:
      # Mount models (if stored locally)
      - ./models_bin:/app/models_bin:ro
      # Mount data
      - ./data:/app/data:ro
      # Mount logs
      - ./logs:/app/logs
    
    depends_on:
      - postgres
      - osrm
    
    networks:
      - tyb-network
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database (if not external)
  postgres:
    image: postgis/postgis:16-3.4
    container_name: tyb-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tyb_production
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
    
    ports:
      - "5432:5432"
    
    networks:
      - tyb-network

  # OSRM Routing Service
  osrm:
    image: osrm/osrm-backend:latest
    container_name: tyb-osrm
    restart: unless-stopped
    
    volumes:
      - ./osrm-data:/data:ro
    
    ports:
      - "5000:5000"
    
    networks:
      - tyb-network
    
    command: osrm-routed --algorithm mld /data/istanbul-latest.osrm

volumes:
  postgres-data:

networks:
  tyb-network:
    driver: bridge